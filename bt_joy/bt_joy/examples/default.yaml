# AETR1234
# | Channel | Meaning          |
# | ------- | ---------------- |
# | A       | Roll (Aileron)   |
# | E       | Pitch (Elevator) |
# | T       | Throttle         |
# | R       | Yaw (Rudder)     |
# | aux1       | arm     |

# Top-level settings:
# device: Linux joystick device from jstest, usually /dev/input/js0
# expected_name: optional exact joystick name from /proc/bus/input/devices or startup logs
# poll_hz: how many UDP packets to send per second
# axes/buttons: expected joystick state sizes; the reader expands if the device reports more
device: /dev/input/js0
expected_name: "STMicroelectronics BETAFPV Joystick" #"Xbox Wireless Controller"
mapping: default_mapping.yaml
poll_hz: 50
keepalive_interval: 1.0
keepalive_timeout: 1.0
joystick_reconnect_interval: 1.0
keepalive_rtt_warning:
  enabled: true
  threshold_ms: 50.0
  window_s: 10.0
  count: 3
  cooldown_s: 10.0
axes: 7
buttons: 16

# UDP destination for packed joystick frames.
udp:
  host: 127.0.0.1
  port: 9000
