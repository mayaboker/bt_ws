# the channels list defines how to map joystick inputs to output values; the reader supports up to 16 channels, but you can use fewer
# Channel fields:
# name: readable channel name used for mapping/debugging
# source: axis, button, or constant
# index: joystick axis/button number from jstest
# in_min/in_max: raw joystick axis range
# out_min/out_max: packed output range, commonly 1000-2000 for RC channels
# deadband: centered stick movement to ignore, as a fraction of full travel; 0.03 = 3%
# invert: true flips an axis direction
# off/on: button output values when released/pressed
# value: fixed output for source: constant
channels:
  - name: roll
    source: axis
    index: 0
    in_min: -32767
    in_max: 32767
    out_min: 1000
    out_max: 2000
    deadband: 0.03

  - name: pitch
    source: axis
    index: 1
    in_min: -32767
    in_max: 32767
    out_min: 1000
    out_max: 2000
    deadband: 0.03
    # invert: true

  - name: throttle
    source: axis
    index: 2
    in_min: -32767
    in_max: 32767
    out_min: 1000
    out_max: 2000

  - name: yaw
    source: axis
    index: 3
    in_min: -32767
    in_max: 32767
    out_min: 1000
    out_max: 2000
    deadband: 0.03

  - name: arm
    source: button
    index: 3
    off: 1000
    on: 2000

  - name: aux2
    source: button
    index: 1
    off: 1000
    on: 2000

  - name: aux3
    source: axis
    index: 5
    in_min: -32767
    in_max: 0
    out_min: 1000
    out_max: 2000

  - name: aux4
    source: axis
    index: 5
    in_min: 0
    in_max: 32767
    out_min: 1000
    out_max: 2000
