channels:
  - name: roll
    source: axis
    index: 0
  - name: pitch
    source: axis
    index: 1
    invert: true
  - name: throttle
    source: axis
    index: 2
    in_min: -32767
    in_max: 32767
    out_min: 1000
    out_max: 2000
  - name: yaw
    source: axis
    index: 3
  - name: arm
    source: button
    index: 0
    off: 1000
    on: 2000
  - name: aux2
    source: constant
    value: 1500
  - name: aux3
    source: constant
    value: 1500
  - name: aux4
    source: constant
    value: 1500
